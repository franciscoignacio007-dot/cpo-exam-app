<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPO 2025 Practice</title>
  <style>
    :root{
      --bg:#f4f7fb; --card:#ffffff; --text:#18212f; --muted:#64748b; --border:#d6deea;
      --accent:#2563eb; --good:#166534; --bad:#991b1b; --shadow:0 10px 28px rgba(0,0,0,.08);
    }
    body.dark{
      --bg:#0b1220; --card:#111827; --text:#e5e7eb; --muted:#9ca3af; --border:#374151;
      --accent:#60a5fa; --good:#4ade80; --bad:#f87171; --shadow:0 12px 28px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .topbar{
      display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;
      padding:14px 16px;border-bottom:1px solid var(--border);background:var(--card);
      position:sticky;top:0;z-index:10;box-shadow:var(--shadow);
    }
    .brand{font-size:28px;font-weight:700}
    .timer{text-align:center;font-size:22px;font-weight:700;min-width:120px;color:var(--accent)}
    .theme-btn{
      justify-self:end;padding:10px 14px;border:1px solid var(--border);border-radius:12px;
      background:var(--card);color:var(--text);cursor:pointer;
    }
    .wrap{
      max-width:1180px;margin:24px auto;padding:0 16px 40px;display:grid;
      grid-template-columns:1fr 320px;gap:20px;
    }
    .card{
      background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:var(--shadow);
    }
    .title{font-size:30px;font-weight:700;margin:0 0 10px}
    .subtitle{color:var(--muted);line-height:1.5;margin:0 0 18px}
    .label{font-size:14px;color:var(--muted);margin-bottom:6px}
    input,button{font:inherit}
    input[type="text"]{
      width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:12px;
      background:var(--bg);color:var(--text);margin-bottom:14px;
    }
    .btn-row{display:flex;flex-wrap:wrap;gap:10px}
    .btn{
      padding:12px 16px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);cursor:pointer;
    }
    .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
    .stat{border:1px solid var(--border);border-radius:14px;background:var(--bg);padding:14px;text-align:center}
    .stat .k{font-size:13px;color:var(--muted)}
    .stat .v{margin-top:4px;font-size:20px;font-weight:700}
    .section-label{
      display:inline-block;padding:6px 10px;border-radius:999px;background:var(--bg);
      border:1px solid var(--border);font-size:12px;color:var(--muted);margin-bottom:14px
    }
    .question{font-size:24px;line-height:1.45;font-weight:700;margin:0 0 18px}
    .option{
      display:block;width:100%;text-align:left;padding:14px;margin-bottom:12px;border:1px solid var(--border);
      border-radius:12px;background:var(--bg);color:var(--text);cursor:pointer;
    }
    .option.selected{border-color:var(--accent);outline:2px solid rgba(37,99,235,.18)}
    .nav{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-top:18px}
    .box{border:1px solid var(--border);border-radius:12px;background:var(--bg);padding:12px;margin-bottom:10px;line-height:1.45}
    .side-title{font-size:22px;font-weight:700;margin:0 0 12px}
    .badge{
      display:inline-block;padding:4px 8px;border:1px solid var(--border);border-radius:999px;margin:4px 6px 0 0;
      font-size:12px;background:var(--card);
    }
    .good{color:var(--good);font-weight:700}
    .bad{color:var(--bad);font-weight:700}
    .muted{color:var(--muted)}
    .empty{color:var(--muted);font-style:italic}
    .error{
      max-width:900px;margin:24px auto;padding:16px;border:2px solid #ff6b6b;background:#fff1f2;color:#7f1d1d;
      border-radius:12px;white-space:pre-wrap;
    }
    @media (max-width:900px){
      .wrap{grid-template-columns:1fr}
      .stats{grid-template-columns:1fr 1fr}
      .brand{font-size:22px}
      .timer{font-size:20px}
      .title{font-size:24px}
      .question{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">CPO 2025</div>
    <div class="timer" id="timer">--:--</div>
    <button class="theme-btn" id="themeBtn">Night Mode</button>
  </div>
  <div id="app"></div>

  <script>
    window.onerror = function(message, source, lineno, colno) {
      var app = document.getElementById("app");
      if (app) {
        app.innerHTML = '<div class="error"><strong>JavaScript error:</strong>\n' + String(message) + '\nLine: ' + lineno + ', Column: ' + colno + '</div>';
      }
    };
  </script>
  <script src="./cpo_2025_v2_system.js"></script>
  <script>
    (function(){
      var app = document.getElementById("app");
      var timerEl = document.getElementById("timer");
      var themeBtn = document.getElementById("themeBtn");

      var state = {
        mode: null,
        name: "",
        questions: [],
        current: 0,
        answers: [],
        score: 0,
        startedAt: null,
        timeLimitSec: 0,
        timerHandle: null,
        darkMode: false,
        history: []
      };

      function loadJson(key, fallback){
        try{
          var raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        }catch(e){
          return fallback;
        }
      }
      function saveJson(key, value){
        localStorage.setItem(key, JSON.stringify(value));
      }
      function escapeHtml(text){
        return String(text)
          .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
      }
      function applyTheme(){
        if(state.darkMode){
          document.body.classList.add("dark");
          themeBtn.textContent = "Light Mode";
        }else{
          document.body.classList.remove("dark");
          themeBtn.textContent = "Night Mode";
        }
      }
      function stopTimer(){
        if(state.timerHandle){
          clearInterval(state.timerHandle);
          state.timerHandle = null;
        }
      }
      function formatTime(sec){
        if(sec < 0) sec = 0;
        var m = Math.floor(sec / 60);
        var s = sec % 60;
        return String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
      }
      function startTimer(){
        stopTimer();
        if(!state.timeLimitSec){
          timerEl.textContent = "--:--";
          return;
        }
        function tick(){
          var elapsed = Math.floor((Date.now() - state.startedAt) / 1000);
          var remain = state.timeLimitSec - elapsed;
          timerEl.textContent = formatTime(remain);
          if(remain <= 0){
            stopTimer();
            finishTest();
          }
        }
        tick();
        state.timerHandle = setInterval(tick, 1000);
      }
      function flatten(blocks){
        return blocks.reduce(function(acc, block){
          block.questions.forEach(function(q){
            acc.push({
              section: block.subject,
              id: q.id,
              concept: q.concept,
              q: q.q,
              options: q.options,
              answer: q.answer,
              explanation: q.explanation,
              subject: q.subject
            });
          });
          return acc;
        }, []);
      }
      function showHome(){
        stopTimer();
        timerEl.textContent = "--:--";
        var reviewer = window.CPO2025.getReviewer();
        var reviewerHtml = Object.keys(reviewer).map(function(subject){
          var badges = reviewer[subject].map(function(item){
            return '<span class="badge">' + escapeHtml(item) + '</span>';
          }).join("");
          return '<div class="box"><strong>' + escapeHtml(subject) + '</strong><div style="margin-top:8px;">' + badges + '</div></div>';
        }).join("");

        var recentHtml = state.history.length ? state.history.slice().reverse().slice(0,8).map(function(item){
          return '<div class="box"><strong>' + escapeHtml(item.name || "Anonymous") + '</strong><div class="muted">' + escapeHtml(item.mode) + '</div><div>Score: <strong>' + item.score + '/' + item.total + '</strong> (' + item.percent + '%)</div></div>';
        }).join("") : '<div class="empty">No previous tests yet.</div>';

        app.innerHTML =
          '<div class="wrap">' +
            '<div class="card">' +
              '<div class="title">CPO 2025 Practice</div>' +
              '<p class="subtitle">Built on a 2025-first foundation. Quiz modes pull from the same engine as the full test, with concept filtering and randomized answer order.</p>' +
              '<div class="label">Your name</div>' +
              '<input id="userName" type="text" placeholder="Enter your name or leave blank for Anonymous" value="' + escapeHtml(state.name) + '">' +
              '<div class="btn-row">' +
                '<button class="btn primary" id="btn10">Start 10 Question Quiz</button>' +
                '<button class="btn" id="btn20">Start 20 Question Quiz</button>' +
                '<button class="btn" id="btn300">Start Full Test (300)</button>' +
              '</div>' +
            '</div>' +
            '<div class="card">' +
              '<div class="side-title">Subjects Reviewer</div>' +
              reviewerHtml +
              '<div class="side-title" style="margin-top:18px;">Recent Results</div>' +
              recentHtml +
            '</div>' +
          '</div>';

        document.getElementById("btn10").onclick = function(){ begin("10 Question Quiz", 10); };
        document.getElementById("btn20").onclick = function(){ begin("20 Question Quiz", 20); };
        document.getElementById("btn300").onclick = function(){ begin("Full Test (300)", 300); };
      }
      function begin(mode, total){
        state.name = (document.getElementById("userName").value || "").trim() || "Anonymous";
        state.mode = mode;
        state.current = 0;
        state.answers = [];
        state.score = 0;

        var blocks;
        if(total === 10){
          blocks = window.CPO2025.buildQuizBlocks(10);
          state.timeLimitSec = 10 * 90;
        }else if(total === 20){
          blocks = window.CPO2025.buildQuizBlocks(20);
          state.timeLimitSec = 20 * 90;
        }else{
          blocks = window.CPO2025.buildFullBlocks(300);
          state.timeLimitSec = 300 * 60;
        }

        state.questions = flatten(blocks);
        state.startedAt = Date.now();
        startTimer();
        renderQuestion();
      }
      function renderQuestion(){
        var q = state.questions[state.current];
        if(!q){ finishTest(); return; }

        var optionsHtml = q.options.map(function(opt, idx){
          var selected = state.answers[state.current] === idx ? ' selected' : '';
          return '<button class="option' + selected + '" data-choice="' + idx + '">' + escapeHtml(opt) + '</button>';
        }).join("");

        app.innerHTML =
          '<div class="wrap">' +
            '<div class="card">' +
              '<div class="stats">' +
                '<div class="stat"><div class="k">User</div><div class="v">' + escapeHtml(state.name) + '</div></div>' +
                '<div class="stat"><div class="k">Question</div><div class="v">' + (state.current + 1) + '/' + state.questions.length + '</div></div>' +
                '<div class="stat"><div class="k">Score</div><div class="v">' + state.score + '</div></div>' +
                '<div class="stat"><div class="k">Mode</div><div class="v">' + (state.mode.indexOf("300") !== -1 ? '300' : state.mode.indexOf("20") !== -1 ? '20' : '10') + '</div></div>' +
              '</div>' +
              '<div class="section-label">' + escapeHtml(q.section) + '</div>' +
              '<div class="question">' + escapeHtml(q.q) + '</div>' +
              optionsHtml +
              '<div class="nav">' +
                '<button class="btn" id="prevBtn"' + (state.current === 0 ? ' disabled' : '') + '>Previous</button>' +
                '<button class="btn" id="homeBtn">Home</button>' +
                '<button class="btn primary" id="nextBtn">' + (state.current === state.questions.length - 1 ? 'Finish Test' : 'Next') + '</button>' +
              '</div>' +
            '</div>' +
            '<div class="card">' +
              '<div class="side-title">Current Section</div>' +
              '<div class="box">' + escapeHtml(q.section) + '</div>' +
              '<div class="side-title">Progress</div>' +
              '<div class="box">Answered: ' + state.answers.filter(function(v){ return typeof v === "number"; }).length + ' / ' + state.questions.length + '</div>' +
            '</div>' +
          '</div>';

        Array.prototype.forEach.call(document.querySelectorAll("[data-choice]"), function(btn){
          btn.onclick = function(){
            state.answers[state.current] = parseInt(btn.getAttribute("data-choice"), 10);
            renderQuestion();
          };
        });

        document.getElementById("prevBtn").onclick = function(){
          if(state.current > 0){
            state.current--;
            renderQuestion();
          }
        };
        document.getElementById("nextBtn").onclick = function(){
          if(typeof state.answers[state.current] !== "number") return;
          if(state.current === state.questions.length - 1){
            finishTest();
          }else{
            state.current++;
            renderQuestion();
          }
        };
        document.getElementById("homeBtn").onclick = function(){
          showHome();
        };
      }
      function finishTest(){
        stopTimer();
        var wrong = [];
        var weak = {};
        state.score = 0;

        state.questions.forEach(function(q, idx){
          var chosen = state.answers[idx];
          if(chosen === q.answer){
            state.score++;
          }else{
            wrong.push({
              q: q.q,
              section: q.section,
              chosen: typeof chosen === "number" ? q.options[chosen] : "(No answer)",
              correct: q.options[q.answer],
              explanation: q.explanation
            });
            weak[q.section] = (weak[q.section] || 0) + 1;
          }
        });

        var weakHtml = Object.keys(weak).length ? Object.keys(weak).sort(function(a,b){ return weak[b]-weak[a]; }).map(function(k){
          return '<div class="box"><strong>' + escapeHtml(k) + '</strong> — ' + weak[k] + ' mistake' + (weak[k] > 1 ? 's' : '') + '</div>';
        }).join("") : '<div class="empty">No weak sections this round.</div>';

        var wrongHtml = wrong.length ? wrong.map(function(item, idx){
          return '<div class="box"><strong>' + (idx + 1) + '. ' + escapeHtml(item.q) + '</strong><div style="margin-top:8px;"><span class="bad">Your answer:</span> ' + escapeHtml(item.chosen) + '</div><div style="margin-top:6px;"><span class="good">Correct answer:</span> ' + escapeHtml(item.correct) + '</div><div style="margin-top:6px;" class="muted">Section: ' + escapeHtml(item.section) + '</div><div style="margin-top:8px;">' + escapeHtml(item.explanation) + '</div></div>';
        }).join("") : '<div class="empty">Perfect run. No mistakes to review.</div>';

        var percent = Math.round((state.score / state.questions.length) * 100);
        state.history.push({
          name: state.name,
          mode: state.mode,
          score: state.score,
          total: state.questions.length,
          percent: percent
        });
        saveJson("cpo2025_v2_history", state.history);

        app.innerHTML =
          '<div class="wrap">' +
            '<div class="card">' +
              '<div class="title">Test Complete</div>' +
              '<p class="subtitle">' + escapeHtml(state.name) + ', your results are ready.</p>' +
              '<div class="stats">' +
                '<div class="stat"><div class="k">Score</div><div class="v">' + state.score + '/' + state.questions.length + '</div></div>' +
                '<div class="stat"><div class="k">Percent</div><div class="v">' + percent + '%</div></div>' +
                '<div class="stat"><div class="k">Mistakes</div><div class="v">' + wrong.length + '</div></div>' +
                '<div class="stat"><div class="k">Mode</div><div class="v">' + escapeHtml(state.mode) + '</div></div>' +
              '</div>' +
              '<div class="side-title">Mistakes Review</div>' +
              wrongHtml +
              '<div class="nav">' +
                '<button class="btn" id="restartBtn">Restart Same Mode</button>' +
                '<button class="btn primary" id="doneHomeBtn">Home</button>' +
              '</div>' +
            '</div>' +
            '<div class="card">' +
              '<div class="side-title">Weak Sections</div>' +
              weakHtml +
            '</div>' +
          '</div>';

        document.getElementById("restartBtn").onclick = function(){
          if(state.mode.indexOf("300") !== -1) begin("Full Test (300)", 300);
          else if(state.mode.indexOf("20") !== -1) begin("20 Question Quiz", 20);
          else begin("10 Question Quiz", 10);
        };
        document.getElementById("doneHomeBtn").onclick = function(){
          showHome();
        };
      }

      themeBtn.onclick = function(){
        state.darkMode = !state.darkMode;
        localStorage.setItem("cpo2025_v2_dark", state.darkMode ? "1" : "0");
        applyTheme();
      };

      state.history = loadJson("cpo2025_v2_history", []);
      state.darkMode = localStorage.getItem("cpo2025_v2_dark") === "1";
      applyTheme();
      showHome();
    })();
  </script>
</body>
</html>
