<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPO 2020 Exam</title>
  <style>
    :root {
      --bg:#f4f7fb; --card:#ffffff; --text:#18212f; --muted:#64748b; --border:#d6deea;
      --accent:#2563eb; --good:#166534; --bad:#991b1b; --shadow:0 10px 28px rgba(0,0,0,.08);
    }
    body.dark {
      --bg:#0b1220; --card:#111827; --text:#e5e7eb; --muted:#9ca3af; --border:#374151;
      --accent:#60a5fa; --good:#4ade80; --bad:#f87171; --shadow:0 12px 28px rgba(0,0,0,.35);
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); }
    .topbar {
      display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px;
      padding:14px 16px; border-bottom:1px solid var(--border); background:var(--card);
      position:sticky; top:0; z-index:10; box-shadow:var(--shadow);
    }
    .brand { font-size:28px; font-weight:700; }
    .timer { text-align:center; font-size:22px; font-weight:700; min-width:120px; color:var(--accent); }
    .theme-btn {
      justify-self:end; padding:10px 14px; border:1px solid var(--border); border-radius:12px;
      background:var(--card); color:var(--text); cursor:pointer;
    }
    .wrap {
      max-width:1100px; margin:24px auto; padding:0 16px 40px; display:grid;
      grid-template-columns:1fr 320px; gap:20px;
    }
    .single { grid-template-columns:1fr; }
    .card {
      background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; box-shadow:var(--shadow);
    }
    .title { font-size:30px; font-weight:700; margin:0 0 10px; }
    .subtitle { color:var(--muted); line-height:1.5; margin:0 0 18px; }
    .label { font-size:14px; color:var(--muted); margin-bottom:6px; }
    input,button { font:inherit; }
    input[type="text"] {
      width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:12px;
      background:var(--bg); color:var(--text); margin-bottom:14px;
    }
    .btn-row { display:flex; flex-wrap:wrap; gap:10px; }
    .btn {
      padding:12px 16px; border:1px solid var(--border); border-radius:12px; background:var(--card); color:var(--text); cursor:pointer;
    }
    .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
    .stat { border:1px solid var(--border); border-radius:14px; background:var(--bg); padding:14px; text-align:center; }
    .stat .k { font-size:13px; color:var(--muted); }
    .stat .v { margin-top:4px; font-size:20px; font-weight:700; }
    .question { font-size:24px; line-height:1.45; font-weight:700; margin:0 0 18px; }
    .option {
      display:block; width:100%; text-align:left; padding:14px; margin-bottom:12px; border:1px solid var(--border);
      border-radius:12px; background:var(--bg); color:var(--text); cursor:pointer;
    }
    .option.selected { border-color:var(--accent); outline:2px solid rgba(37,99,235,.18); }
    .nav { display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-top:18px; }
    .box { border:1px solid var(--border); border-radius:12px; background:var(--bg); padding:12px; margin-bottom:10px; line-height:1.45; }
    .side-title { font-size:22px; font-weight:700; margin:0 0 12px; }
    .badge {
      display:inline-block; padding:4px 8px; border:1px solid var(--border); border-radius:999px; margin:4px 6px 0 0;
      font-size:12px; background:var(--card);
    }
    .good { color:var(--good); font-weight:700; }
    .bad { color:var(--bad); font-weight:700; }
    .muted { color:var(--muted); }
    .empty { color:var(--muted); font-style:italic; }
    .error {
      max-width:900px; margin:24px auto; padding:16px; border:2px solid #ff6b6b; background:#fff1f2; color:#7f1d1d;
      border-radius:12px; white-space:pre-wrap;
    }
    @media (max-width:900px) {
      .wrap { grid-template-columns:1fr; }
      .stats { grid-template-columns:1fr 1fr; }
      .brand { font-size:22px; }
      .timer { font-size:20px; }
      .title { font-size:24px; }
      .question { font-size:20px; }
    }
  </style>
</head>

      var FULL_COUNTS = {"Foundations of Protection": 20, "Communications and Operations": 20, "Physical and Technical Security": 20, "Safety, Fire, First Aid, and WHMIS": 25, "Threats and Risk Management": 25, "Investigations and Espionage": 20, "Legal Aspects and Liability": 25, "Officer Safety and Use of Force": 20, "Public Relations and Professionalism": 25, "Emerging Trends": 25};
      var CORE_IDS = new Set([1, 4, 7, 10, 28, 31, 34, 37, 43, 52, 61, 64, 67, 85, 88, 97, 103, 106, 109, 112, 121, 124, 127, 139, 142, 157, 160, 163, 166, 172, 181, 184, 187, 193, 202, 211, 220, 223, 226, 229, 241, 244, 247, 256, 262, 271, 274, 277, 283, 286]);

      var state = {
        themeDark: localStorage.getItem("cpo2020_dark")==="1",
        timerId: null,
        timerSeconds: 0,
        mode: "",
        name: "Anonymous",
        blocks: [],
        blockIndex: 0,
        questionIndex: 0,
        answers: {},
        history: normalizeHistory(loadHistory())
      };

      function normalizeHistory(list) {
        var safe = [];
        if (!Array.isArray(list)) return safe;
        for (var i = 0; i < list.length; i++) {
          var h = list[i] || {};
          safe.push({
            name: h.name || "Anonymous",
            mode: h.mode || "Unknown",
            score: typeof h.score === "number" ? h.score : 0,
            total: typeof h.total === "number" ? h.total : 0,
            percent: typeof h.percent === "number" ? h.percent : 0,
            weak: Array.isArray(h.weak) ? h.weak : []
          });
        }
        return safe;
      }

      function loadHistory() {
        try { return JSON.parse(localStorage.getItem("cpo2020_history") || "[]"); }
        catch (e) { return []; }
      }

      function saveHistory() {
        localStorage.setItem("cpo2020_history", JSON.stringify(state.history));
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function applyTheme() {
        document.body.classList.toggle("dark", state.themeDark);
        themeBtn.textContent = state.themeDark ? "Light Mode" : "Night Mode";
        localStorage.setItem("cpo2020_dark", state.themeDark ? "1" : "0");
      }

      function setTimer(text) {
        timerEl.textContent = text;
      }

      function fmtTime(sec) {
        var h = Math.floor(sec / 3600);
        var m = Math.floor((sec % 3600) / 60);
        var s = sec % 60;
        if (h > 0) return h + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
        return m + ":" + String(s).padStart(2, "0");
      }

      function stopTimer() {
        if (state.timerId) {
          clearInterval(state.timerId);
          state.timerId = null;
        }
      }

      function startTimer(seconds) {
        stopTimer();
        state.timerSeconds = seconds;
        setTimer(fmtTime(seconds));
        state.timerId = setInterval(function() {
          state.timerSeconds--;
          setTimer(fmtTime(Math.max(0, state.timerSeconds)));
          if (state.timerSeconds <= 0) {
            stopTimer();
            finishTest(true);
          }
        }, 1000);
      }

      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      function pickUnique(arr, count) {
        var shuffled = shuffle(arr);
        return shuffled.slice(0, Math.min(count, shuffled.length));
      }

      function subjectBank(subject) {
        return BANK[subject].slice();
      }

      function splitCoreAndExtra(subject) {
        var all = subjectBank(subject);
        var core = [];
        var extra = [];
        for (var i = 0; i < all.length; i++) {
          if (CORE_IDS.has(all[i].id)) core.push(all[i]);
          else extra.push(all[i]);
        }
        return { core: core, extra: extra };
      }

      function buildFullBlocks() {
        var blocks = [];
        for (var i = 0; i < SUBJECTS.length; i++) {
          var subject = SUBJECTS[i];
          var parts = splitCoreAndExtra(subject);
          var needed = FULL_COUNTS[subject];
          var chosen = parts.core.slice();
          var remainder = needed - chosen.length;
          var extras = pickUnique(parts.extra, remainder);
          chosen = chosen.concat(extras);
          blocks.push({
            subject: subject,
            questions: chosen
          });
        }
        return blocks;
      }

      function buildQuizBlocks(size) {
        var chosenSubjects = shuffle(SUBJECTS).slice(0, size === 10 ? 1 : 2);
        var blocks = [];
        for (var i = 0; i < chosenSubjects.length; i++) {
          blocks.push({
            subject: chosenSubjects[i],
            questions: pickUnique(subjectBank(chosenSubjects[i]), 10)
          });
        }
        return blocks;
      }

      function getTotalQuestions() {
        var sum = 0;
        for (var i = 0; i < state.blocks.length; i++) sum += state.blocks[i].questions.length;
        return sum;
      }

      function getGlobalNumber() {
        var n = 0;
        for (var i = 0; i < state.blockIndex; i++) n += state.blocks[i].questions.length;
        return n + state.questionIndex + 1;
      }

      function home() {
        stopTimer();
        setTimer("--:--");

        var historyHtml = "";
        if (state.history.length) {
          for (var i = state.history.length - 1; i >= 0; i--) {
            var h = state.history[i];
            var weak = "";
            if (Array.isArray(h.weak) && h.weak.length) {
              for (var j = 0; j < h.weak.length; j++) {
                weak += '<span class="badge">' + escapeHtml(h.weak[j]) + '</span>';
              }
            } else {
              weak = '<span class="badge">No weak topics recorded</span>';
            }

            historyHtml +=
              '<div class="box">' +
                '<div><strong>' + escapeHtml(h.name) + '</strong></div>' +
                '<div class="muted">' + escapeHtml(h.mode) + '</div>' +
                '<div>Score: <strong>' + h.score + '/' + h.total + '</strong> (' + h.percent + '%)</div>' +
                '<div style="margin-top:8px">' + weak + '</div>' +
              '</div>';
          }
        } else {
          historyHtml = '<div class="empty">No previous tests yet.</div>';
        }

        app.innerHTML =
          '<div class="wrap">' +
            '<div class="card">' +
              '<h1 class="title">CPO 2020 Practice Test</h1>' +
              '<p class="subtitle">This version uses 300 unique questions, 30 per subject. Full tests lock your core exam topics so they always appear in the correct sections.</p>' +
              '<div class="label">Examinee name</div>' +
              '<input id="nameInput" type="text" placeholder="Enter name or leave blank for Anonymous">' +
              '<div class="btn-row">' +
                '<button class="btn primary" id="quiz10Btn">Start 10 Question Quiz</button>' +
                '<button class="btn" id="quiz20Btn">Start 20 Question Quiz</button>' +
                '<button class="btn" id="fullBtn">Start Full Test</button>' +
                '<button class="btn" id="reviewerBtn">Subjects Reviewer</button>' +
              '</div>' +
            '</div>' +
            '<div class="card">' +
              '<div class="side-title">Previous Tests</div>' +
              historyHtml +
            '</div>' +
          '</div>';

        document.getElementById("quiz10Btn").onclick = function() { startQuiz(10); };
        document.getElementById("quiz20Btn").onclick = function() { startQuiz(20); };
        document.getElementById("fullBtn").onclick = function() { startFull(); };
        document.getElementById("reviewerBtn").onclick = function() { showReviewer(); };
      }

      function getName() {
        var el = document.getElementById("nameInput");
        return (el && el.value.trim()) || "Anonymous";
      }

      function startQuiz(size) {
        state.name = getName();
        state.answers = {};
        state.blockIndex = 0;
        state.questionIndex = 0;
        state.mode = size === 10 ? "10 Question Quiz" : "20 Question Quiz";
        state.blocks = buildQuizBlocks(size);
        startTimer(size === 10 ? 15 * 60 : 30 * 60);
        showSectionIntro();
      }

      function startFull() {
        state.name = getName();
        state.answers = {};
        state.blockIndex = 0;
        state.questionIndex = 0;
        state.mode = "Full Test";
        state.blocks = buildFullBlocks();
        startTimer(3 * 60 * 60);
        showSectionIntro();
      }

      function showSectionIntro() {
        var block = state.blocks[state.blockIndex];
        app.innerHTML =
          '<div class="wrap single">' +
            '<div class="card" style="max-width:760px;margin:0 auto">' +
              '<h1 class="title">' + escapeHtml(block.subject) + '</h1>' +
              '<p class="subtitle">This section contains ' + block.questions.length + ' unique questions.</p>' +
              '<div class="btn-row">' +
                '<button class="btn primary" id="startSectionBtn">Start Section</button>' +
                '<button class="btn" id="homeBtn">Home</button>' +
              '</div>' +
            '</div>' +
          '</div>';

        document.getElementById("startSectionBtn").onclick = function() { showQuestion(); };
        document.getElementById("homeBtn").onclick = function() { home(); };
      }

      function showQuestion() {
        var block = state.blocks[state.blockIndex];
        var q = block.questions[state.questionIndex];
        var key = state.blockIndex + "-" + state.questionIndex;
        var selected = state.answers[key];
        var total = getTotalQuestions();
        var globalNum = getGlobalNumber();

        var optionsHtml = "";
        for (var i = 0; i < q.options.length; i++) {
          var cls = selected === i ? "option selected" : "option";
          optionsHtml += '<button class="' + cls + '" data-choice="' + i + '">' + escapeHtml(q.options[i]) + '</button>';
        }

        app.innerHTML =
          '<div class="wrap">' +
            '<div class="card">' +
              '<div class="stats">' +
                '<div class="stat"><div class="k">Examinee</div><div class="v">' + escapeHtml(state.name) + '</div></div>' +
                '<div class="stat"><div class="k">Question</div><div class="v">' + globalNum + '/' + total + '</div></div>' +
                '<div class="stat"><div class="k">Section</div><div class="v" style="font-size:16px">' + escapeHtml(block.subject) + '</div></div>' +
                '<div class="stat"><div class="k">Mode</div><div class="v" style="font-size:16px">' + escapeHtml(state.mode) + '</div></div>' +
              '</div>' +
              '<div class="question">' + escapeHtml(q.q) + '</div>' +
              optionsHtml +
              '<div class="nav">' +
                '<button class="btn" id="backBtn">Back</button>' +
                '<button class="btn primary" id="nextBtn">Next</button>' +
              '</div>' +
            '</div>' +
            '<div class="card">' +
              '<div class="side-title">' + escapeHtml(block.subject) + '</div>' +
              '<div class="box">Question ' + (state.questionIndex + 1) + ' of ' + block.questions.length + ' in this section.</div>' +
              '<div class="box">Question ID: ' + q.id + (CORE_IDS.has(q.id) ? ' <span class="badge">Core</span>' : '') + '</div>' +
            '</div>' +
          '</div>';

        var optionButtons = document.querySelectorAll("[data-choice]");
        for (var j = 0; j < optionButtons.length; j++) {
          optionButtons[j].onclick = function() {
            state.answers[key] = Number(this.getAttribute("data-choice"));
            showQuestion();
          };
        }

        document.getElementById("backBtn").onclick = function() { back(); };
        document.getElementById("nextBtn").onclick = function() { next(); };
      }

      function back() {
        if (state.questionIndex > 0) {
          state.questionIndex--;
          showQuestion();
          return;
        }
        if (state.blockIndex > 0) {
          state.blockIndex--;
          state.questionIndex = state.blocks[state.blockIndex].questions.length - 1;
          showQuestion();
        }
      }

      function next() {
        var key = state.blockIndex + "-" + state.questionIndex;
        if (typeof state.answers[key] === "undefined") {
          alert("Choose an answer first.");
          return;
        }

        var block = state.blocks[state.blockIndex];
        if (state.questionIndex < block.questions.length - 1) {
          state.questionIndex++;
          showQuestion();
          return;
        }

        if (state.blockIndex < state.blocks.length - 1) {
          state.blockIndex++;
          state.questionIndex = 0;
          showSectionIntro();
          return;
        }

        finishTest(false);
      }

      function finishTest(timedOut) {
        stopTimer();

        var score = 0;
        var weak = {};
        var mistakes = [];

        for (var b = 0; b < state.blocks.length; b++) {
          var block = state.blocks[b];
          for (var q = 0; q < block.questions.length; q++) {
            var item = block.questions[q];
            var chosen = state.answers[b + "-" + q];
            if (chosen === item.answer) {
              score++;
            } else {
              weak[block.subject] = (weak[block.subject] || 0) + 1;
              mistakes.push({
                subject: block.subject,
                question: item.q,
                your: typeof chosen === "undefined" ? "No answer" : item.options[chosen],
                correct: item.options[item.answer],
                explanation: item.explanation
              });
            }
          }
        }

        var total = getTotalQuestions();
        var percent = Math.round((score / total) * 100);
        var weakList = Object.keys(weak).sort(function(a,b) { return weak[b] - weak[a]; });

        state.history.push({
          name: state.name,
          mode: timedOut ? state.mode + " (Timed Out)" : state.mode,
          score: score,
          total: total,
          percent: percent,
          weak: weakList.map(function(s) { return s + " (" + weak[s] + ")"; })
        });
        saveHistory();

        var weakHtml = "";
        if (weakList.length) {
          for (var i = 0; i < weakList.length; i++) {
            weakHtml += '<div class="box"><strong>' + escapeHtml(weakList[i]) + '</strong> — ' + weak[weakList[i]] + ' mistake' + (weak[weakList[i]] === 1 ? '' : 's') + '</div>';
          }
        } else {
          weakHtml = '<div class="empty">No weak topics this time.</div>';
        }

        var mistakesHtml = "";
        if (mistakes.length) {
          for (var j = 0; j < mistakes.length; j++) {
            var m = mistakes[j];
            mistakesHtml +=
              '<div class="box">' +
                '<div><strong>' + (j + 1) + '. ' + escapeHtml(m.question) + '</strong></div>' +
                '<div style="margin-top:8px"><span class="muted">Subject:</span> ' + escapeHtml(m.subject) + '</div>' +
                '<div style="margin-top:6px"><span class="muted">Your answer:</span> <span class="bad">' + escapeHtml(m.your) + '</span></div>' +
                '<div style="margin-top:6px"><span class="muted">Correct answer:</span> <span class="good">' + escapeHtml(m.correct) + '</span></div>' +
                '<div style="margin-top:8px">' + escapeHtml(m.explanation) + '</div>' +
              '</div>';
          }
        } else {
          mistakesHtml = '<div class="empty">Perfect run. No mistakes to review.</div>';
        }

        app.innerHTML =
          '<div class="wrap">' +
            '<div class="card">' +
              '<h1 class="title">Test Complete</h1>' +
              '<p class="subtitle">' + (timedOut ? "Time ran out. " : "") + escapeHtml(state.name) + ', your results are ready.</p>' +
              '<div class="stats">' +
                '<div class="stat"><div class="k">Score</div><div class="v">' + score + '/' + total + '</div></div>' +
                '<div class="stat"><div class="k">Percent</div><div class="v">' + percent + '%</div></div>' +
                '<div class="stat"><div class="k">Mistakes</div><div class="v">' + mistakes.length + '</div></div>' +
                '<div class="stat"><div class="k">Mode</div><div class="v" style="font-size:16px">' + escapeHtml(state.mode) + '</div></div>' +
              '</div>' +
              '<div class="side-title">Mistakes Review</div>' +
              mistakesHtml +
              '<div class="nav"><button class="btn" id="homeDoneBtn">Home</button></div>' +
            '</div>' +
            '<div class="card">' +
              '<div class="side-title">Weak Topics</div>' +
              weakHtml +
            '</div>' +
          '</div>';

        document.getElementById("homeDoneBtn").onclick = function() { home(); };
      }

      function showReviewer() {
        var html = "";
        for (var i = 0; i < SUBJECTS.length; i++) {
          var subject = SUBJECTS[i];
          var tags = "";
          for (var j = 0; j < REVIEWER[subject].length; j++) {
            tags += '<span class="badge">' + escapeHtml(REVIEWER[subject][j]) + '</span>';
          }
          html +=
            '<div class="box">' +
              '<div><strong>' + escapeHtml(subject) + '</strong></div>' +
              '<div style="margin-top:8px">' + tags + '</div>' +
            '</div>';
        }

        app.innerHTML =
          '<div class="wrap single">' +
            '<div class="card" style="max-width:760px;margin:0 auto">' +
              '<h1 class="title">Subjects Reviewer</h1>' +
              '<p class="subtitle">Each subject has 30 prepared unique questions. Full tests lock core questions to their correct subject blocks.</p>' +
              html +
              '<div class="nav"><button class="btn" id="reviewerHomeBtn">Home</button></div>' +
            '</div>' +
          '</div>';

        document.getElementById("reviewerHomeBtn").onclick = function() { home(); };
      }

      themeBtn.onclick = function() {
        state.themeDark = !state.themeDark;
        applyTheme();
      };

      applyTheme();
      home();
    })();
  </script>
</body>
</html>
